# ===============================================================
# Server Configuration
# ===============================================================
# The port on which the microservice will run
server.port=8082

# ===============================================================
# Application Metadata
# ===============================================================
# Unique name for the application in the microservices ecosystem
spring.application.name=EmployeeService

# ===============================================================
# Database Configuration (PostgreSQL)
# ===============================================================
# Connection URL for the PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:5432/personaldb
# Database credentials
spring.datasource.username=chan
spring.datasource.password=1234
# PostgreSQL JDBC driver class
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================================================
# Redis Configuration (Cache/Data store)
# ===============================================================
# Connection details for the Redis server
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
# ===============================================================
# JPA / Hibernate Configuration
# ===============================================================
# Logs the SQL statements generated by Hibernate to the console
spring.jpa.show-sql=true

# Strategy for database schema synchronization (create = drops and recreates on startup)
spring.jpa.hibernate.ddl-auto=update
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Disable Open-Session-In-View to improve performance and connection management
spring.jpa.open-in-view=false

# Specific dialect for PostgreSQL optimizations
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Set the JDBC timezone to match your local region
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
