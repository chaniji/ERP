spring.application.name=ApiGateway
server.port=9191

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Spring Cloud Gateway Routing (WebMVC)
# Using Service Discovery (lb://)
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://AuthService
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.mvc.routes[1].id=employee-service
spring.cloud.gateway.mvc.routes[1].uri=lb://EmployeeService
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/employees/**

spring.cloud.gateway.mvc.routes[2].id=inventory-service
spring.cloud.gateway.mvc.routes[2].uri=lb://InventoryService
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/inventory/**

spring.cloud.gateway.mvc.routes[3].id=payroll-service
spring.cloud.gateway.mvc.routes[3].uri=lb://PayrollService
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/payroll/**

# JWT Secret
jwt.secret=mySuperSecretKeyForERPSystem12345
